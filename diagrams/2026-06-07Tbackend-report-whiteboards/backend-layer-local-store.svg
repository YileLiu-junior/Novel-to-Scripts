<text x="1675" y="285" font-size="20" font-weight="900" fill="#333333" letter-spacing="0">CODE COMMENT SIGNALS</text>
<rect x="1675" y="320" width="459" height="70" rx="0" fill="#F5F5F5" stroke="#0A0A0A" stroke-width="3"/>
<text x="1694" y="347" font-size="19" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">ProjectService</tspan></text>
<text x="1694" y="372" font-size="15" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">创建稳定 local project records；routes 不碰 repository files。</tspan></text>
<rect x="1675" y="406" width="459" height="70" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="1694" y="433" font-size="19" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">file_store.py</tspan></text>
<text x="1694" y="458" font-size="15" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">集中 JSON/Text 序列化与 atomic replacement。</tspan></text>
<rect x="1675" y="492" width="459" height="70" rx="0" fill="#F5F5F5" stroke="#0A0A0A" stroke-width="3"/>
<text x="1694" y="519" font-size="19" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">Screenplay</tspan></text>
<text x="1694" y="544" font-size="15" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">顶层聚合根，把 bible、events、plan、scenes、audit 串成资产。</tspan></text>
<rect x="1675" y="578" width="459" height="70" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="1694" y="605" font-size="19" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">CoreElements</tspan></text>
<text x="1694" y="630" font-size="15" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">索引层，不替代 story_bible 或正文，只让关键元素可检查。</tspan></text>
<rect x="1675" y="664" width="459" height="70" rx="0" fill="#F5F5F5" stroke="#0A0A0A" stroke-width="3"/>
<text x="1694" y="691" font-size="19" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">YamlService</tspan></text>
<text x="1694" y="716" font-size="15" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">导出前强制 validation；有 error 就拒绝导出。</tspan></text>
<rect x="1675" y="750" width="459" height="70" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="1694" y="777" font-size="19" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">workers/jobs.py</tspan></text>
<text x="1694" y="802" font-size="15" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1694" dy="0">fire-and-forget：route 立刻给 job_id，前端轮询。</tspan></text>
<rect x="596" y="936" width="1574" height="485" rx="0" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="3"/>
<rect x="590" y="930" width="1574" height="485" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="620" y="975" font-size="20" font-weight="900" fill="#333333" letter-spacing="0">LOCAL PROJECT STORE</text>
<rect x="620" y="1010" width="675" height="345" rx="0" fill="#E5EDD6" stroke="#0A0A0A" stroke-width="3"/>
<text x="650" y="1062" font-size="34" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="650" dy="0">data/</tspan></text>
<text x="650" y="1110" font-size="22" font-weight="600" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="650" dy="0">projects.json</tspan><tspan x="650" dy="35">projects/{project_id}/project.json</tspan><tspan x="650" dy="35">projects/{project_id}/chapters/index.json</tspan><tspan x="650" dy="35">projects/{project_id}/jobs/index.json</tspan><tspan x="650" dy="35">projects/{project_id}/artifacts/index.json</tspan><tspan x="650" dy="35">projects/{project_id}/artifacts/story_bible_v001.json</tspan><tspan x="650" dy="35">projects/{project_id}/artifacts/screenplay_yaml_v001.yaml</tspan></text>
<rect x="1320" y="1010" width="814" height="160" rx="0" fill="#F2D4CF" stroke="#0A0A0A" stroke-width="3"/>
<text x="1350" y="1054" font-size="28" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1350" dy="0">为什么不是 SQLite</tspan></text>
<text x="1350" y="1095" font-size="21" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1350" dy="0">V0+V1 目标是 demo reliability 和 inspectable artifacts。</tspan><tspan x="1350" dy="31">本地文件更利于人工检查、git diff、fixture contract 和快速调试。</tspan><tspan x="1350" dy="31">不引入连接池、迁移、外部队列或多用户一致性复杂度。</tspan></text>
<rect x="1320" y="1195" width="814" height="160" rx="0" fill="#F5F5F5" stroke="#0A0A0A" stroke-width="3"/>
<text x="1350" y="1239" font-size="28" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1350" dy="0">持久化不变量</tspan></text>
<text x="1350" y="1280" font-size="21" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1350" dy="0">Artifact version 按 project_id + type 递增。</tspan><tspan x="1350" dy="31">Job 保存 status / current_step / error / artifact_ids。</tspan><tspan x="1350" dy="31">写入使用临时文件 + os.replace，避免半个 JSON。</tspan></text>
<rect x="42" y="1486" width="2128" height="235" rx="0" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="3"/>
<rect x="36" y="1480" width="2128" height="235" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="66" y="1525" font-size="20" font-weight="900" fill="#333333" letter-spacing="0">ARCHITECTURAL VALUE</text>
<rect x="66" y="1560" width="390" height="115" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="86" y="1598" font-size="24" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="86" dy="0">Contract first</tspan></text>
<text x="86" y="1635" font-size="17" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="86" dy="0">schema 是唯一真相源</tspan><tspan x="86" dy="24">DTO 与 fixtures 对齐</tspan></text>
<rect x="481" y="1560" width="390" height="115" rx="0" fill="#F5F5F5" stroke="#0A0A0A" stroke-width="3"/>
<text x="501" y="1598" font-size="24" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="501" dy="0">Traceable</tspan></text>
<text x="501" y="1635" font-size="17" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="501" dy="0">每个 AI step 保存 artifact</tspan><tspan x="501" dy="24">失败也可复查已生成产物</tspan></text>
<rect x="896" y="1560" width="390" height="115" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="916" y="1598" font-size="24" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="916" dy="0">Replaceable AI</tspan></text>
<text x="916" y="1635" font-size="17" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="916" dy="0">服务只依赖 AiProvider</tspan><tspan x="916" dy="24">当前运行时是 DeepSeek</tspan></text>
<rect x="1311" y="1560" width="390" height="115" rx="0" fill="#F5F5F5" stroke="#0A0A0A" stroke-width="3"/>
<text x="1331" y="1598" font-size="24" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1331" dy="0">Deterministic gates</tspan></text>
<text x="1331" y="1635" font-size="17" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1331" dy="0">校验层不调用模型/网络</tspan><tspan x="1331" dy="24">findings 带 path / target_id</tspan></text>
<rect x="1726" y="1560" width="390" height="115" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="1746" y="1598" font-size="24" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1746" dy="0">Export reliability</tspan></text>
<text x="1746" y="1635" font-size="17" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1746" dy="0">内部 JSON 是真相</tspan><tspan x="1746" dy="24">YAML/Markdown 是可读导出</tspan></text>
