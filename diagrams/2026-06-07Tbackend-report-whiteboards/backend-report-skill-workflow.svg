<text x="1121" y="1498" font-size="18" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1121" dy="0">三章输入 + job 轮询</tspan><tspan x="1121" dy="26">artifact 列表 + 导出</tspan></text>
