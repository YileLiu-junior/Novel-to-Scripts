<text x="86" y="1498" font-size="18" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="86" dy="0">AI 生成不是重点</tspan><tspan x="86" dy="26">重点是可审计 workflow</tspan></text>
<rect x="411" y="1425" width="325" height="115" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="431" y="1462" font-size="24" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="431" dy="0">2 架构</tspan></text>
<text x="431" y="1498" font-size="18" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="431" dy="0">schema-first</tspan><tspan x="431" dy="26">domain 聚合 + service 编排</tspan></text>
<rect x="756" y="1425" width="325" height="115" rx="0" fill="#F5F5F5" stroke="#0A0A0A" stroke-width="3"/>
<text x="776" y="1462" font-size="24" font-weight="900" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="776" dy="0">3 流程</tspan></text>
<text x="776" y="1498" font-size="18" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="776" dy="0">chapters → skills</tspan><tspan x="776" dy="26">artifacts → validation</tspan></text>
