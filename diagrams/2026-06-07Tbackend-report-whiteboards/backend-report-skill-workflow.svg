<text x="70" y="145" font-size="30" font-weight="700" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="70" dy="0">汇报方案 · 架构设计 · 产品卖点 · Skill Workflow</tspan></text>
<text x="780" y="94" font-size="28" font-weight="750" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="780" dy="0">不是一次 prompt 写剧本，而是把 AI 输出变成可检查、可追踪、可导出的 adaptation assets。</tspan></text>
<text x="780" y="138" font-size="24" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="780" dy="0">代码负责结构、引用、状态、导出可靠性；AI 负责内容生成与改编判断。</tspan></text>
