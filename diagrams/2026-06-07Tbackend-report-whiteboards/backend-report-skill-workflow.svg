<rect x="66" y="905" width="470" height="160" rx="0" fill="#E5EDD6" stroke="#0A0A0A" stroke-width="3"/>
<text x="88" y="945" font-size="24" font-weight="850" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="88" dy="0">NovelReaderSkill</tspan></text>
<text x="88" y="983" font-size="19" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="88" dy="0">读章节与段落 ID</tspan><tspan x="88" dy="27">抽取 characters / events / foreshadowing</tspan><tspan x="88" dy="27">输出 source refs，给后续追踪</tspan></text>
<rect x="556" y="905" width="470" height="160" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="578" y="945" font-size="24" font-weight="850" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="578" dy="0">StoryOntologySkill</tspan></text>
<text x="578" y="983" font-size="19" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="578" dy="0">把 novel analysis 变成 story bible</tspan><tspan x="578" dy="27">角色关系、knowledge states、voice profiles</tspan><tspan x="578" dy="27">形成可复用的故事资产层</tspan></text>
<rect x="66" y="1085" width="470" height="160" rx="0" fill="#F2D4CF" stroke="#0A0A0A" stroke-width="3"/>
<text x="88" y="1125" font-size="24" font-weight="850" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="88" dy="0">AdaptationPlannerSkill</tspan></text>
<text x="88" y="1163" font-size="19" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="88" dy="0">消费 story bible + adaptation config</tspan><tspan x="88" dy="27">决定 retained / merged / deferred events</tspan><tspan x="88" dy="27">产出 protected elements 与 scene_plan</tspan></text>
<rect x="556" y="1085" width="470" height="160" rx="0" fill="#F5F5F5" stroke="#0A0A0A" stroke-width="3"/>
<text x="578" y="1125" font-size="24" font-weight="850" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="578" dy="0">ScreenplayWriterSkill</tspan></text>
<text x="578" y="1163" font-size="19" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="578" dy="0">消费 scene_plan 与 canonical assets</tspan><tspan x="578" dy="27">输出 schema-shaped screenplay JSON</tspan><tspan x="578" dy="27">历史名含 YAML，但真实 YAML 属 exporter</tspan></text>
<rect x="66" y="1246" width="960" height="48" rx="0" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="0"/>
<text x="86" y="1277" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="start" letter-spacing="0"><tspan x="86" dy="0">Skill 不写数据库、不决定 job、不导出 YAML；orchestrator 负责串联、保存、校验。</tspan></text>
<rect x="1116" y="836" width="1054" height="470" rx="0" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="3"/>
<rect x="1110" y="830" width="1054" height="470" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="1140" y="875" font-size="20" font-weight="900" fill="#333333" letter-spacing="0">设计角度分析</text>
<rect x="1140" y="905" width="490" height="160" rx="0" fill="#F5F5F5" stroke="#0A0A0A" stroke-width="3"/>
<text x="1162" y="945" font-size="24" font-weight="850" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1162" dy="0">LLM 输出不可靠</tspan></text>
<text x="1162" y="983" font-size="19" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1162" dy="0">用 normalizer 删除非法 null、补最小合法字段</tspan><tspan x="1162" dy="27">再交给 schema validator 报真实结构问题</tspan></text>
<rect x="1650" y="905" width="490" height="160" rx="0" fill="#E5EDD6" stroke="#0A0A0A" stroke-width="3"/>
<text x="1672" y="945" font-size="24" font-weight="850" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1672" dy="0">内容必须可追溯</tspan></text>
<text x="1672" y="983" font-size="19" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1672" dy="0">source.chapters、events、scenes、dialogue 都有 ID</tspan><tspan x="1672" dy="27">reference validator 指向具体 entity IDs</tspan></text>
<rect x="1140" y="1085" width="490" height="160" rx="0" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
<text x="1162" y="1125" font-size="24" font-weight="850" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1162" dy="0">前后端要并行</tspan></text>
<text x="1162" y="1163" font-size="19" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1162" dy="0">HTTP API + DTO 是唯一入口</tspan><tspan x="1162" dy="27">frontend 只按 schema 和 api_client 解析</tspan></text>
<rect x="1650" y="1085" width="490" height="160" rx="0" fill="#F2D4CF" stroke="#0A0A0A" stroke-width="3"/>
<text x="1672" y="1125" font-size="24" font-weight="850" fill="#0A0A0A" text-anchor="start" letter-spacing="0"><tspan x="1672" dy="0">Demo 要稳定</tspan></text>
<text x="1672" y="1163" font-size="19" font-weight="500" fill="#333333" text-anchor="start" letter-spacing="0"><tspan x="1672" dy="0">job_id 立即返回，后台跑 pipeline</tspan><tspan x="1672" dy="27">artifact index 允许复查每一步产物</tspan></text>
