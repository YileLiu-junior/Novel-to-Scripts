<svg xmlns="http://www.w3.org/2000/svg" width="1650" height="3420" viewBox="0 0 1650 3420">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 4 L0 8 z"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1650" height="3420" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="80" y="70" width="1490" height="310" rx="8" fill="#0055A4"/>
  <text x="130" y="155" fill="#DCF4A2" font-size="58" font-weight="800">AI 小说转 YAML 剧本工作台</text>
  <text x="130" y="215" fill="#FFFFFF" font-size="30" font-weight="700">从黑箱生成，转向可追溯、可审查、可继续打磨的改编资产</text>
  <text x="130" y="272" fill="#FFFFFF" font-size="24">定位：AI 不是替代编剧的 Writer，而是尊重原著、懂视听转译的改编助理。</text>
  <rect x="1230" y="115" width="250" height="200" rx="8" fill="#DCF4A2"/>
  <text x="1270" y="175" fill="#0055A4" font-size="34" font-weight="800">MVP 主线</text>
  <text x="1270" y="225" fill="#0055A4" font-size="24">3+ 章节输入</text>
  <text x="1270" y="263" fill="#0055A4" font-size="24">结构化 YAML</text>
  <text x="1270" y="301" fill="#0055A4" font-size="24">Schema 文档</text>

  <!-- Thesis -->
  <text x="80" y="475" fill="#0055A4" font-size="34" font-weight="800">核心产品判断</text>
  <line x1="80" y1="505" x2="1570" y2="505" stroke="#DCF4A2" stroke-width="6"/>

  <rect x="80" y="550" width="460" height="210" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="115" y="605" fill="#0055A4" font-size="28" font-weight="800">普通 AI 的问题</text>
  <text x="115" y="655" fill="#0055A4" font-size="22">• 直接从小说跳到剧本文本</text>
  <text x="115" y="695" fill="#0055A4" font-size="22">• 改编理由不可见</text>
  <text x="115" y="735" fill="#0055A4" font-size="22">• 伏笔、关系、人物声音易丢失</text>

  <line x1="560" y1="655" x2="710" y2="655" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="735" y="550" width="755" height="210" rx="8" fill="#DCF4A2" stroke="#0055A4" stroke-width="3"/>
  <text x="775" y="605" fill="#0055A4" font-size="28" font-weight="800">我们的策略</text>
  <text x="775" y="655" fill="#0055A4" font-size="22">先生成“故事圣经”，再规划改编策略，最后输出可校验 YAML。</text>
  <text x="775" y="695" fill="#0055A4" font-size="22">让每场戏都能回答：来自哪里、承接什么、埋了什么、谁知道什么。</text>
  <text x="775" y="735" fill="#0055A4" font-size="22">创作判断交给 Skill，结构可信交给代码。</text>

  <!-- Pipeline -->
  <text x="80" y="860" fill="#0055A4" font-size="34" font-weight="800">端到端工作流</text>
  <line x1="80" y1="890" x2="1570" y2="890" stroke="#DCF4A2" stroke-width="6"/>

  <rect x="80" y="940" width="230" height="145" rx="8" fill="#0055A4"/>
  <text x="118" y="990" fill="#DCF4A2" font-size="26" font-weight="800">01 输入</text>
  <text x="118" y="1032" fill="#FFFFFF" font-size="21">3+ 章节小说</text>
  <text x="118" y="1065" fill="#FFFFFF" font-size="21">章节与段落 ID</text>

  <line x1="330" y1="1015" x2="405" y2="1015" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="425" y="940" width="260" height="145" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="465" y="990" fill="#0055A4" font-size="26" font-weight="800">02 故事本体</text>
  <text x="465" y="1032" fill="#0055A4" font-size="21">人物 / 关系 / 秘密</text>
  <text x="465" y="1065" fill="#0055A4" font-size="21">知识状态 / 事件</text>

  <line x1="705" y1="1015" x2="780" y2="1015" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="800" y="940" width="250" height="145" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="835" y="990" fill="#0055A4" font-size="26" font-weight="800">03 改编计划</text>
  <text x="835" y="1032" fill="#0055A4" font-size="21">忠实度 / 目标格式</text>
  <text x="835" y="1065" fill="#0055A4" font-size="21">保留 / 合并 / 压缩</text>

  <line x1="1070" y1="1015" x2="1145" y2="1015" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1165" y="940" width="250" height="145" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="1200" y="990" fill="#0055A4" font-size="26" font-weight="800">04 YAML 剧本</text>
  <text x="1200" y="1032" fill="#0055A4" font-size="21">场景 / 动作 / 对白</text>
  <text x="1200" y="1065" fill="#0055A4" font-size="21">潜台词 / 引用</text>

  <line x1="1435" y1="1015" x2="1510" y2="1015" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="80" y="1130" width="1490" height="115" rx="8" fill="#DCF4A2"/>
  <text x="120" y="1180" fill="#0055A4" font-size="26" font-weight="800">05 审查与导出</text>
  <text x="120" y="1220" fill="#0055A4" font-size="22">连续性 warning、未兑现伏笔、台词过度解释、Schema 校验、YAML 下载。</text>

  <!-- Iteration route -->
  <text x="80" y="1345" fill="#0055A4" font-size="34" font-weight="800">V0 → V5 迭代路线</text>
  <line x1="80" y1="1375" x2="1570" y2="1375" stroke="#DCF4A2" stroke-width="6"/>

  <rect x="80" y="1425" width="220" height="265" rx="8" fill="#0055A4"/>
  <text x="120" y="1480" fill="#DCF4A2" font-size="42" font-weight="900">V0</text>
  <text x="120" y="1525" fill="#FFFFFF" font-size="24" font-weight="800">题目合规</text>
  <text x="120" y="1570" fill="#FFFFFF" font-size="20">• 3+ 章输入</text>
  <text x="120" y="1605" fill="#FFFFFF" font-size="20">• 基础场景 YAML</text>
  <text x="120" y="1640" fill="#FFFFFF" font-size="20">• 初版 Schema</text>

  <rect x="330" y="1425" width="220" height="265" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="370" y="1480" fill="#0055A4" font-size="42" font-weight="900">V1</text>
  <text x="370" y="1525" fill="#0055A4" font-size="24" font-weight="800">可控改编</text>
  <text x="370" y="1570" fill="#0055A4" font-size="20">• 忠实度</text>
  <text x="370" y="1605" fill="#0055A4" font-size="20">• 目标格式</text>
  <text x="370" y="1640" fill="#0055A4" font-size="20">• 改编计划</text>

  <rect x="580" y="1425" width="220" height="265" rx="8" fill="#DCF4A2" stroke="#0055A4" stroke-width="3"/>
  <text x="620" y="1480" fill="#0055A4" font-size="42" font-weight="900">V2</text>
  <text x="620" y="1525" fill="#0055A4" font-size="24" font-weight="800">故事本体</text>
  <text x="620" y="1570" fill="#0055A4" font-size="20">• 人物卡</text>
  <text x="620" y="1605" fill="#0055A4" font-size="20">• 关系/秘密</text>
  <text x="620" y="1640" fill="#0055A4" font-size="20">• 知识状态</text>

  <rect x="830" y="1425" width="220" height="265" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="870" y="1480" fill="#0055A4" font-size="42" font-weight="900">V3</text>
  <text x="870" y="1525" fill="#0055A4" font-size="24" font-weight="800">因果伏笔</text>
  <text x="870" y="1570" fill="#0055A4" font-size="20">• 事件链</text>
  <text x="870" y="1605" fill="#0055A4" font-size="20">• setup/payoff</text>
  <text x="870" y="1640" fill="#0055A4" font-size="20">• 来源追溯</text>

  <rect x="1080" y="1425" width="220" height="265" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="1120" y="1480" fill="#0055A4" font-size="42" font-weight="900">V4</text>
  <text x="1120" y="1525" fill="#0055A4" font-size="24" font-weight="800">角色声音</text>
  <text x="1120" y="1570" fill="#0055A4" font-size="20">• voice profile</text>
  <text x="1120" y="1605" fill="#0055A4" font-size="20">• 潜台词</text>
  <text x="1120" y="1640" fill="#0055A4" font-size="20">• 动作外化</text>

  <rect x="1330" y="1425" width="240" height="265" rx="8" fill="#0055A4"/>
  <text x="1370" y="1480" fill="#DCF4A2" font-size="42" font-weight="900">V5</text>
  <text x="1370" y="1525" fill="#FFFFFF" font-size="24" font-weight="800">审查闭环</text>
  <text x="1370" y="1570" fill="#FFFFFF" font-size="20">• continuity</text>
  <text x="1370" y="1605" fill="#FFFFFF" font-size="20">• warning 定位</text>
  <text x="1370" y="1640" fill="#FFFFFF" font-size="20">• YAML 修复</text>

  <line x1="300" y1="1558" x2="326" y2="1558" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="550" y1="1558" x2="576" y2="1558" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="800" y1="1558" x2="826" y2="1558" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1050" y1="1558" x2="1076" y2="1558" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1300" y1="1558" x2="1326" y2="1558" stroke="#0055A4" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="80" y="1735" width="1490" height="105" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="120" y="1782" fill="#0055A4" font-size="24" font-weight="800">推荐交付组合</text>
  <text x="120" y="1820" fill="#0055A4" font-size="22">最低：V0 + V1 + V2；技术故事最强：V0 + V1 + V2 + V3；完整比赛版：V0 到 V5 的轻量实现。</text>

  <!-- Skill vs Dev -->
  <text x="80" y="1940" fill="#0055A4" font-size="34" font-weight="800">Skill 与开发的边界</text>
  <line x1="80" y1="1970" x2="1570" y2="1970" stroke="#DCF4A2" stroke-width="6"/>

  <rect x="80" y="2020" width="690" height="470" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <rect x="80" y="2020" width="690" height="72" rx="8" fill="#0055A4"/>
  <text x="125" y="2067" fill="#DCF4A2" font-size="28" font-weight="800">Skill 限制大模型</text>
  <text x="125" y="2140" fill="#0055A4" font-size="23" font-weight="800">负责创作判断</text>
  <text x="125" y="2185" fill="#0055A4" font-size="21">• NovelReader：抽取人物、事件、伏笔候选</text>
  <text x="125" y="2225" fill="#0055A4" font-size="21">• StoryOntology：生成故事圣经和知识状态</text>
  <text x="125" y="2265" fill="#0055A4" font-size="21">• AdaptationPlanner：决定保留、合并、压缩</text>
  <text x="125" y="2305" fill="#0055A4" font-size="21">• ScreenplayYamlWriter：按 Schema 输出 YAML</text>
  <text x="125" y="2345" fill="#0055A4" font-size="21">• DialogueDoctor：潜台词、动作外化、去 AI 味</text>
  <text x="125" y="2385" fill="#0055A4" font-size="21">• ContinuityAuditor：检查伏笔和人物知识冲突</text>
  <text x="125" y="2440" fill="#0055A4" font-size="21" font-weight="800">原则：无证据内容标为 inferred，不把推断写成事实。</text>

  <rect x="880" y="2020" width="690" height="470" rx="8" fill="#DCF4A2" stroke="#0055A4" stroke-width="3"/>
  <rect x="880" y="2020" width="690" height="72" rx="8" fill="#0055A4"/>
  <text x="925" y="2067" fill="#DCF4A2" font-size="28" font-weight="800">开发保证结构可信</text>
  <text x="925" y="2140" fill="#0055A4" font-size="23" font-weight="800">负责流程、校验和可编辑</text>
  <text x="925" y="2185" fill="#0055A4" font-size="21">• 多章节输入、章节/段落 ID、字数校验</text>
  <text x="925" y="2225" fill="#0055A4" font-size="21">• 人物卡、关系、事件、伏笔的编辑面板</text>
  <text x="925" y="2265" fill="#0055A4" font-size="21">• YAML 预览、格式化、复制和下载</text>
  <text x="925" y="2305" fill="#0055A4" font-size="21">• Schema 校验与引用完整性检查</text>
  <text x="925" y="2345" fill="#0055A4" font-size="21">• warning 列表：定位到 scene / event / character</text>
  <text x="925" y="2385" fill="#0055A4" font-size="21">• 版本策略：先保证 V0-V3，V4/V5 做轻量亮点</text>
  <text x="925" y="2440" fill="#0055A4" font-size="21" font-weight="800">原则：创作可失败，但结构不能乱。</text>

  <!-- Schema / ontology -->
  <text x="80" y="2595" fill="#0055A4" font-size="34" font-weight="800">Schema：把改编推理过程写进 YAML</text>
  <line x1="80" y1="2625" x2="1570" y2="2625" stroke="#DCF4A2" stroke-width="6"/>

  <rect x="80" y="2675" width="1490" height="350" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="120" y="2735" fill="#0055A4" font-size="26" font-weight="800">普通 Schema 只描述剧本排版；我们的 Schema 描述“原著如何被改编成剧本”。</text>

  <rect x="120" y="2788" width="190" height="70" rx="8" fill="#0055A4"/>
  <text x="154" y="2832" fill="#FFFFFF" font-size="22" font-weight="800">source</text>
  <rect x="340" y="2788" width="190" height="70" rx="8" fill="#DCF4A2" stroke="#0055A4" stroke-width="3"/>
  <text x="370" y="2832" fill="#0055A4" font-size="22" font-weight="800">story_bible</text>
  <rect x="560" y="2788" width="190" height="70" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="610" y="2832" fill="#0055A4" font-size="22" font-weight="800">events</text>
  <rect x="770" y="2788" width="230" height="70" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="804" y="2832" fill="#0055A4" font-size="22" font-weight="800">causal_graph</text>
  <rect x="1030" y="2788" width="250" height="70" rx="8" fill="#DCF4A2" stroke="#0055A4" stroke-width="3"/>
  <text x="1065" y="2832" fill="#0055A4" font-size="22" font-weight="800">foreshadowing</text>
  <rect x="1310" y="2788" width="190" height="70" rx="8" fill="#0055A4"/>
  <text x="1358" y="2832" fill="#FFFFFF" font-size="22" font-weight="800">scenes</text>

  <text x="120" y="2920" fill="#0055A4" font-size="22">场景不只是 action + dialogue，还包含 source_refs、causal_links、foreshadowing、subtext、audit_report。</text>
  <text x="120" y="2965" fill="#0055A4" font-size="22">这让作者能审查：这场戏来自哪段原著，承接哪个事件，埋下哪个伏笔，人物是否知道相关秘密。</text>

  <!-- 72h -->
  <text x="80" y="3130" fill="#0055A4" font-size="34" font-weight="800">72h 执行节奏</text>
  <line x1="80" y1="3160" x2="1570" y2="3160" stroke="#DCF4A2" stroke-width="6"/>

  <rect x="80" y="3210" width="455" height="140" rx="8" fill="#0055A4"/>
  <text x="120" y="3260" fill="#DCF4A2" font-size="28" font-weight="800">Day 1：骨架与数据</text>
  <text x="120" y="3302" fill="#FFFFFF" font-size="21">章节输入、Schema、故事本体初稿。</text>

  <rect x="595" y="3210" width="455" height="140" rx="8" fill="#FFFFFF" stroke="#0055A4" stroke-width="3"/>
  <text x="635" y="3260" fill="#0055A4" font-size="28" font-weight="800">Day 2：生成与可控</text>
  <text x="635" y="3302" fill="#0055A4" font-size="21">改编计划、YAML 剧本、来源追溯。</text>

  <rect x="1115" y="3210" width="455" height="140" rx="8" fill="#DCF4A2" stroke="#0055A4" stroke-width="3"/>
  <text x="1155" y="3260" fill="#0055A4" font-size="28" font-weight="800">Day 3：亮点与演示</text>
  <text x="1155" y="3302" fill="#0055A4" font-size="21">潜台词、伏笔审查、Schema 文档。</text>

  <text x="80" y="3390" fill="#0055A4" font-size="22" font-weight="800">Scope 边界：预算风险模块暂缓，避免把 MVP 拖进制片规则系统。</text>
</svg>
