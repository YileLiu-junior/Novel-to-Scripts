  story_outline:
  - id: outline_001
    summary: 【Fake Provider】根据《前传（一）》构造：前传（一） 近来，我很有些嗜睡。 奈奈说：“大概是因为怀了孕，所以分外渴睡些，娘娘不必担心。”
      奈奈是照顾我的婢女，也是整个洗梧宫唯一肯对我笑，唤我“娘娘”的仙子。其他仙子们大多看不起我。因为夜华并没有封给我什么名分。也因为，我没有仙籍，只是个凡人。
      奈奈似乎推开了窗，有风拂进来，窗外传来谁的脚步声。奈奈的声音有些惊喜
    related_events:
    - event_001
    target_scenes:
    - scene_001
  - id: outline_002
    summary: 【Fake Provider】根据《第一章第1节》构造：第一章第1节 若水神君嫁去东海的大姑娘不满三年就给东海水君添了个男丁，若水东海两家皆大欢喜。
      东海水君本人更是得意非凡，为儿子做满月酒的请柬撒遍了天上地下，连阿爹阿娘住的狐狸洞也给送来了份。 阿爹阿娘已经游方在外数百年。一二三哥相继安家立室分了封地，四哥则去了西山寻找走失的坐骑毕方鸟。是以，这狐狸洞如今只剩我一人当家。
    related_events:
    - event_002
    target_scenes:
    - scene_002
  - id: outline_003
    summary: 【Fake Provider】根据《第一章二》构造：第一章二 这下我倒笑不出来了。 北海水君那小娘子唤作少辛，这名字还是我给起的。 也记不清是多少年前，我和四哥去洞庭湖游玩，在半人高的芦苇荡里，发现了条被欺负得气息奄奄的小巴蛇。
      我看着可怜，便央四哥将它带回了青丘。 那时小巴蛇已经修成了精，虽软趴软趴，但也勉强能化出个人形，这便是少辛。少辛在青丘养了两年伤，伤好后，说要
    related_events:
    - event_003
    target_scenes:
    - scene_003
  literary_screenplay:
    unit: scene
    format_note: fake provider generated from current project chapters
    scene_ids:
    - scene_001
    - scene_002
    - scene_003
