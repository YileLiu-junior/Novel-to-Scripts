schema_version: "1.0"
project:
  id: "project_demo_sherlock"
  title: "血字的研究 - 结构化改编样例"
  logline: "退役军医华生与古怪侦探福尔摩斯合租后，被一桩神秘凶案带入新的生活。"
  target_format: "web_series"
source:
  case_id: "sherlock_study_in_pink"
  novel_source_file: "research/novel-to-script-cases/01_sherlock_study_in_pink/a-study-in-scarlet_novel_zh.txt"
  screenplay_reference_file: "research/novel-to-script-cases/01_sherlock_study_in_pink/sherlock-a-study-in-pink_script_zh.txt"
  chapters:
    - id: "chapter_001"
      title: "歇洛克·福尔摩斯先生"
      order: 1
    - id: "chapter_002"
      title: "演绎法"
      order: 2
    - id: "chapter_003"
      title: "劳里斯顿花园疑案"
      order: 3
adaptation_config:
  target_format: "web_series"
  fidelity_level: "high"
  preserve_priorities:
    - "relationship_arc"
    - "deduction_showcase"
    - "case_inciting_event"
  dialogue_style: "restrained_with_subtext"
story_bible:
  characters:
    - id: "char_001"
      name: "约翰·华生"
      aliases: ["华生", "华生医生"]
      narrative_role: "point_of_view"
      voice_profile:
        rhythm: "观察细致，叙述克制"
        defense_mechanism: "用理性记录掩饰不安"
    - id: "char_002"
      name: "歇洛克·福尔摩斯"
      aliases: ["福尔摩斯"]
      narrative_role: "detective"
      voice_profile:
        rhythm: "短促、精准、带有推理上的优越感"
        defense_mechanism: "用知识和冷静压过情绪"
    - id: "char_003"
      name: "斯坦福德"
      aliases: ["年轻的斯坦福德"]
      narrative_role: "connector"
      voice_profile:
        rhythm: "谨慎、委婉"
        defense_mechanism: "用玩笑保持距离"
  relationship_edges:
    - id: "rel_001"
      from: "char_001"
      to: "char_002"
      type: "new_flatmates_with_mutual_curiosity"
      current_state: "华生好奇，福尔摩斯愿意展示能力但保持神秘"
      evidence_level: "explicit"
  knowledge_states:
    - character_id: "char_001"
      knows: ["event_001", "event_002"]
      does_not_know: ["event_003"]
events:
  - id: "event_001"
    title: "华生寻找住处"
    event_type: "setup"
    participants: ["char_001", "char_003"]
    summary: "华生因经济压力寻找住处，斯坦福德提到福尔摩斯。"
  - id: "event_002"
    title: "福尔摩斯与华生开始合租"
    event_type: "relationship_turn"
    participants: ["char_001", "char_002"]
    summary: "两人决定合住贝克街。"
  - id: "event_003"
    title: "劳里斯顿花园疑案到来"
    event_type: "inciting_case"
    participants: ["char_001", "char_002"]
    summary: "格雷格森来信请求福尔摩斯协助调查空屋凶案。"
causal_graph:
  edges:
    - from: "event_001"
      to: "event_002"
      relation: "enables"
      explanation: "找住处的需求使华生进入福尔摩斯的生活空间。"
    - from: "event_002"
      to: "event_003"
      relation: "enables"
      explanation: "合租关系使华生能够跟随福尔摩斯进入案件。"
foreshadowing:
  - id: "foreshadow_001"
    setup_event_id: "event_002"
    payoff_event_id: "event_003"
    payoff_scene_id: "scene_002"
    status: "planned"
    description: "福尔摩斯的推理能力先被日常观察展示，随后在正式案件中兑现。"
adaptation_plan:
  retained_events: ["event_001", "event_002", "event_003"]
  merged_events: []
  deleted_or_deferred_events: []
  protected_elements: ["rel_001", "foreshadow_001"]
  scene_plan:
    - scene_id: "scene_001"
      purpose: "建立华生与福尔摩斯的关系入口"
      source_events: ["event_001", "event_002"]
    - scene_id: "scene_002"
      purpose: "用案件邀请把关系转为行动"
      source_events: ["event_003"]
scenes:
  - id: "scene_001"
    title: "贝克街合租"
    source_refs:
      - chapter_id: "chapter_001"
        paragraph_range: "p_002-p_003"
      - chapter_id: "chapter_002"
        paragraph_range: "p_001"
    dramatic_purpose: ["建立主角关系", "展示福尔摩斯的古怪吸引力"]
    location:
      name: "贝克街房间"
      time: "day"
      interior_exterior: "INT"
    characters: ["char_001", "char_002", "char_003"]
    related_events: ["event_001", "event_002"]
    foreshadowing:
      setups: ["foreshadow_001"]
      payoffs: []
    action:
      - "华生打量房间，福尔摩斯已经把注意力放在更细微的观察上。"
    dialogue:
      - id: "line_001"
        character_id: "char_001"
        line: "如果房租真的能分摊，我愿意试试。"
        surface_intent: "接受合租安排"
        subtext: "他需要一个新的开始，但不愿显得太脆弱"
        emotional_state: "controlled_uncertainty"
        action_hint: "他把手杖靠到椅边，目光仍停在福尔摩斯身上"
  - id: "scene_002"
    title: "案子敲门"
    source_refs:
      - chapter_id: "chapter_003"
        paragraph_range: "p_001-p_003"
    dramatic_purpose: ["引入第一个案件", "兑现福尔摩斯推理能力"]
    location:
      name: "贝克街客厅"
      time: "morning"
      interior_exterior: "INT"
    characters: ["char_001", "char_002"]
    related_events: ["event_003"]
    foreshadowing:
      setups: []
      payoffs: ["foreshadow_001"]
    action:
      - "一封来自苏格兰场的信被递进来，福尔摩斯的倦怠立刻被案件点亮。"
    dialogue:
      - id: "line_003"
        character_id: "char_002"
        line: "终于有件事不像例行公事。"
        surface_intent: "表达对案件的兴趣"
        subtext: "他需要复杂问题来证明自己的方法"
        emotional_state: "contained_excitement"
        action_hint: "他迅速套上外衣，语速比刚才快了一拍"
audit_report:
  continuity_warnings: []
  unresolved_foreshadowing: []
  dialogue_warnings: []
  schema_warnings: []
